apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: flux-drift-webhook
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: flux-drift-webhook
  minReplicas: 3
  maxReplicas: 9
  # CPU-only: admission processing is CPU-bound, so CPU is the load signal.
  # Memory is flat/sticky (controller-runtime caches) and not a load signal,
  # so it is intentionally excluded to keep nominal at minReplicas and only
  # scale on genuine load spikes.
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 4
          periodSeconds: 15
      selectPolicy: Max
