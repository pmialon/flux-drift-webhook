apiVersion: apps/v1
kind: Deployment
metadata:
  name: flux-drift-webhook
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: flux-drift-webhook
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flux-drift-webhook
    spec:
      serviceAccountName: flux-drift-webhook
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: webhook
          image: ghcr.io/pmialon/flux-drift-webhook:latest
          args:
            - --webhook-port=9443
            - --metrics-bind-addr=:8080
            - --health-probe-bind-addr=:8081
            - --cert-dir=/certs
            - --log-encoding=json
            - --enable-leader-election=true
          env:
            # Without this the runtime sizes P to the NODE's core count, not the
            # container's share, over-subscribing on a small pod. One P is enough:
            # admission handling is short bursts of JSON decoding and set algebra,
            # and there is no CPU limit, so a burst is served at full core speed.
            - name: GOMAXPROCS
              value: "1"
            # Soft ceiling below the 128Mi limit so the GC reclaims instead of the
            # kernel OOM-killing the container. The headroom (28Mi) covers what
            # GOMEMLIMIT does not account for — chiefly the mapped binary — since
            # it only bounds Go-runtime memory (heap, stacks, runtime metadata).
            - name: GOMEMLIMIT
              value: "100MiB"
          ports:
            - name: https
              containerPort: 9443
              protocol: TCP
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          # Burstable QoS. The CPU limit is deliberately omitted: admission is on
          # the critical path of every write, and CFS throttling would add latency
          # to requests the API server times out on. Memory is capped because a
          # runaway cache should be killed, not left to evict the node.
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: certs
              mountPath: /certs
              readOnly: true
      volumes:
        - name: certs
          secret:
            secretName: flux-drift-webhook-tls
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: flux-drift-webhook
                topologyKey: kubernetes.io/hostname
