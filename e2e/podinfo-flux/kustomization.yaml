apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# podinfo, labelled as if a Kustomization named flux-system/e2e-app had applied
# it. Kept as an overlay so ../podinfo stays byte-identical to upstream and
# `make e2e-vendor` can refresh it without clobbering these additions.
#
# podinfo is a good fixture for two reasons: its Deployment declares no
# .spec.replicas — exactly the shape the README prescribes so an autoscaler can
# own that field — and it ships an HPA alongside, so the headline field-level
# case (Flux owns .spec.template, the HPA owns .spec.replicas) is testable
# without inventing a workload.

namespace: drift-enforce-test

resources:
  - ../podinfo

labels:
  - pairs:
      kustomize.toolkit.fluxcd.io/name: e2e-app
      kustomize.toolkit.fluxcd.io/namespace: flux-system
    includeSelectors: false
