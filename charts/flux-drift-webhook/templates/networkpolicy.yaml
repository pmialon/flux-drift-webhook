{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "flux-drift-webhook.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "flux-drift-webhook.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "flux-drift-webhook.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    # Allow the API server to reach the webhook port (admission requests).
    - ports:
        - port: {{ .Values.ports.webhook }}
          protocol: TCP
{{- end }}
